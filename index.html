<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Cruise Scheduler">
<meta name="theme-color" content="#222222">
<link rel="manifest" id="manifest-placeholder">
<title>Cruise Scheduler</title>
<style>
body {
  font-family: Arial;
  margin:0;
  background: var(--bg);
  color: var(--text);
}
header { padding:10px; background:#222; color:#fff; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
button { padding:6px 10px; }

:root {
  --bg: #fdf6e3;
  --text: #657b83;
  --row-even: #eee8d5;
  --row-odd: #fdf6e3;
  --border-soft: #e0dac7;
  --picked: #268bd2;   /* solarized blue */
  --maybe: #93a1a1;
  --hour-line: rgba(0,0,0,0.12);
  --list-text: #657b83;
}

.dark {
  --bg: #1e1e1e;
  --text: #0a0a0a;
  --row-even: #252526;
  --row-odd: #1e1e1e;
  --border-soft: #333;
  --picked: #268bd2;   /* solarized blue */
  --maybe: #93a1a1;
  --hour-line: rgba(255,255,255,0.12);
  --list-text: #d4d4d4;
}

.row { display:flex; border-bottom:1px solid #ddd; }
.stage {
  width:160px; min-width:160px;
  box-sizing: border-box;
  background:#f4f4f4;
  border-right:1px solid #ccc;
  padding:5px;
  position:sticky;
  left:0;
  z-index:2;
}

.timeline {
  position:relative;
  height:60px;
}

.event {
  position:absolute;
  top:5px;
  height:50px;
  border-radius:6px;
  padding:2px;
  font-size:11px;
  overflow:hidden;
  cursor:pointer;
  border:1px solid #333;
  background:#eee;
  box-sizing: border-box;
}

.picked { background:#2196f3; color:white; }
.maybe { background:#ffb702; color:#242424; }
.conflict {
  border: 3px solid red !important;
  box-shadow: 0 0 6px red;
}

/* Hour grid lines inside timeline rows */
.hour-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--hour-line);
  pointer-events: none;
  z-index: 0;
}

.timeHeader { display:flex; position:sticky; top:0; background:white; z-index:3; }
.timeCell {
  flex: 0 0 auto;
  box-sizing: border-box;
}
.hour {
  border-left: 2px solid var(--text);
  font-weight: bold;
}

#list { padding:10px; }
textarea { width:100%; height:200px; }

#gridView {
  overflow-x: auto;
  overflow-y: auto;
  cursor: grab;
}
#gridView:active {
  cursor: grabbing;
}

/* ── Tooltip ─────────────────────────────────────────────── */
#tooltip {
  position: fixed;
  background: rgba(0,0,0,0.75);
  color: #fff;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 12px;
  pointer-events: none;
  white-space: nowrap;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.15s;
}
#tooltip.visible { opacity: 1; }
</style>
</head>

<body>

<header>
<select id="daySelect"></select>
<button onclick="showView('grid')">Grid</button>
<button onclick="showView('list')">My Schedule</button>

<button onclick="zoomFit()">Fit Day</button>
<button onclick="zoomIn()">+</button>

<button onclick="toggleTheme()">🌙</button>

<div id="gridView"></div>
<div id="list" style="display:none;"></div>

let state = JSON.parse(localStorage.getItem("cruiseState")) || {};

function saveState() {
  localStorage.setItem("cruiseState", JSON.stringify(state));
}

function parseTime(t) {
  let [time, mod] = t.split(" ");
  let [h, m] = time.split(":").map(Number);
  if (mod === "PM" && h !== 12) h += 12;
  if (mod === "AM" && h === 12) h = 0;
  return h*60 + m;
}

function cycle(id) {
  state[id] = (state[id] + 1 || 1) % 3;
  saveState();
  render();
}

function render() {
  renderGrid();
  renderList();
}

function renderGrid() {
  const container = document.getElementById("gridView");
  container.innerHTML = "";

  const day = document.getElementById("daySelect").value;
  const events = data.days[day];

  // Use stageOrder if defined, then append any stages not listed
  const discovered = [...new Set(events.map(e=>e.stage))];
  const order = data.stageOrder || [];
  const stages = [
    ...order.filter(s => discovered.includes(s)),
    ...discovered.filter(s => !order.includes(s))
  ];

  // ── Time header ──────────────────────────────────────────────
  const header = document.createElement("div");
  header.className = "timeHeader";

  // Spacer that matches the sticky stage column
  const stageSpacer = document.createElement("div");
  stageSpacer.style.cssText = "width:160px; min-width:160px; flex-shrink:0;";
  header.appendChild(stageSpacer);

  for (let h = START_HOUR; h < END_HOUR; h++) {
    for (let m of [0,15,30,45]) {
      const cell = document.createElement("div");
      cell.className = "timeCell" + (m === 0 ? " hour" : "");
      // Width is set via box-sizing:border-box, so border is included
      cell.style.width = pixels() + "px";
      cell.style.height = "20px";
      cell.style.fontSize = "11px";
      cell.style.overflow = "visible";
      cell.style.whiteSpace = "nowrap";
      cell.style.position = "relative";
      cell.style.zIndex = "1";
      if (m === 0) {
        const displayH = h % 24;
        const label = displayH === 0 ? "12:00 AM"
          : displayH < 12 ? displayH + ":00 AM"
          : displayH === 12 ? "12:00 PM"
          : (displayH - 12) + ":00 PM";
        cell.innerText = label;
      }
      header.appendChild(cell);
    }
  }

  container.appendChild(header);

  // ── Stage rows ───────────────────────────────────────────────
  const totalMinutes = (END_HOUR - START_HOUR) * 60;
  const totalBlocks  = totalMinutes / 15;
  const timelineWidth = totalBlocks * pixels();

  stages.forEach(stage => {
    const row = document.createElement("div");
    row.className = "row";

    const label = document.createElement("div");
    label.className = "stage";
    label.innerText = stage;
    row.appendChild(label);

    const timeline = document.createElement("div");
    timeline.className = "timeline";
    timeline.style.width = timelineWidth + "px";

    // Soft vertical hour lines
    for (let h = 0; h < (END_HOUR - START_HOUR); h++) {
      const line = document.createElement("div");
      line.className = "hour-line";
      line.style.left = (h * 4 * pixels()) + "px";
      timeline.appendChild(line);
    }

    // Events
    events.forEach((e, idx) => {
      if (e.stage !== stage) return;

      const start  = parseTime(e.time);
      const left   = ((start - START_HOUR * 60) / 15) * pixels();
      const width  = (e.duration / 15) * pixels();
      const id     = day + "_" + idx;

      const div = document.createElement("div");
      div.dataset.id = id;
      div.className = "event";
      if (state[id] === 1) div.classList.add("picked");
      if (state[id] === 2) div.classList.add("maybe");

      div.style.left  = left + "px";
      div.style.width = width + "px";
      div.innerText   = e.band;
      div.onclick = () => {
        if (isDragging) return;
        cycle(id);
      };
      attachTooltip(div, e.band + " — " + e.time);

      timeline.appendChild(div);
    });

    row.appendChild(timeline);
    container.appendChild(row);
  });

  detectConflicts(events, day);
}

function detectConflicts(events, day) {
  // Clear old conflicts
  document.querySelectorAll(".event").forEach(e => e.classList.remove("conflict"));

  // Build picked list WITH DOM references
  const picked = events.map((e, i) => {
    const id = day + "_" + i;
    const el = document.querySelector(`.event[data-id="${id}"]`);

    return {
      ...e,
      id,
      el,
      start: parseTime(e.time),
      end: parseTime(e.time) + e.duration
    };
  }).filter(e => state[e.id] === 1 && e.el);

  // Compare every pair
  for (let i = 0; i < picked.length; i++) {
    for (let j = i + 1; j < picked.length; j++) {

      const a = picked[i];
      const b = picked[j];

      if (a.start < b.end && b.start < a.end) {
        a.el.classList.add("conflict");
        b.el.classList.add("conflict");
      }
    }
  }
}

function renderList() {
  const container = document.getElementById("list");
  container.innerHTML = "";
  container.style.color = "var(--list-text)";

  const day = document.getElementById("daySelect").value;
  const events = data.days[day];

  // Include BOTH picked (1) and maybe (2)
  const selected = events.map((e,i)=>({...e,id:day+"_"+i}))
    .filter(e=>state[e.id] === 1 || state[e.id] === 2)
    .sort((a,b)=>parseTime(a.time)-parseTime(b.time));

  // Header row
  const header = document.createElement("div");
  header.style.display = "grid";
  header.style.gridTemplateColumns = "100px 1fr 160px 80px";
  header.style.fontWeight = "bold";
  header.style.marginBottom = "8px";

  header.innerHTML = "<div>Time</div><div>Band</div><div>Stage</div><div>Status</div>";
  container.appendChild(header);

  // Rows
  selected.forEach((e, index) => {
    const div = document.createElement("div");

    div.style.display = "grid";
    div.style.gridTemplateColumns = "100px 1fr 160px 80px";
    div.style.gap = "10px";
    div.style.padding = "6px 4px";

    // alternating rows
    div.style.background = index % 2 === 0 ? "var(--row-even)" : "var(--row-odd)";
    div.style.borderBottom = "1px solid var(--border-soft)";

    const time = document.createElement("div");
    time.innerText = e.time;

    const band = document.createElement("div");
    band.innerText = e.band;

    const stage = document.createElement("div");
    stage.innerText = e.stage;

    const status = document.createElement("div");
    status.innerText =
      state[e.id] === 1 ? "Picked" :
      state[e.id] === 2 ? "Maybe" : "";

    status.style.color =
      state[e.id] === 1 ? "var(--picked)" :
      state[e.id] === 2 ? "var(--maybe)" : "";

    div.append(time, band, stage, status);
    container.appendChild(div);
  });
}

function showView(v) {
  document.getElementById("gridView").style.display  = v === "grid" ? "block" : "none";
  document.getElementById("list").style.display      = v === "list" ? "block" : "none";
  document.getElementById("editView").style.display  = v === "edit" ? "block" : "none";

  if (v==="edit") document.getElementById("editor").value = JSON.stringify(data, null, 2);
}

function saveData() {
  data = JSON.parse(document.getElementById("editor").value);
  localStorage.setItem("cruiseData", JSON.stringify(data));
  render();
}

function zoomIn()  { zoom *= 1.25; render(); }
function zoomOut() { zoom /= 1.25; render(); }
function zoomFit() { zoom = 0.4;   render(); } // zoomed way out


function init() {
  const sel = document.getElementById("daySelect");
  Object.keys(data.days).forEach(d=>{
    const opt = document.createElement("option");
    opt.value = d;
    opt.innerText = d;
    sel.appendChild(opt);
  });
  sel.onchange = render;
  zoomFit();
}

// ── Drag to scroll ───────────────────────────────────────────────
let isDown = false;
let startX;
let scrollLeft;
const grid = document.getElementById("gridView");

grid.addEventListener("mousedown", e => {
  isDown = true;
  isDragging = false;
  startX = e.pageX - grid.offsetLeft;
  scrollLeft = grid.scrollLeft;
});

grid.addEventListener("mouseleave", () => { isDown = false; });
grid.addEventListener("mouseup",    () => { isDown = false; });
grid.addEventListener("mousemove",  e => {
  if (!isDown) return;
  isDragging = true;
  e.preventDefault();
  const x = e.pageX - grid.offsetLeft;
  grid.scrollLeft = scrollLeft - (x - startX) * 1.5;
});

// ── Pinch to zoom ────────────────────────────────────────────────
let initialDistance = null;
let initialZoom = 1;

grid.addEventListener("touchstart", e => {
  if (e.touches.length === 2) {
    initialDistance = getDistance(e.touches);
    initialZoom = zoom;
  }
});

grid.addEventListener("touchmove", e => {
  if (e.touches.length === 2 && initialDistance) {
    e.preventDefault();
    const scale = getDistance(e.touches) / initialDistance;
    zoom = Math.min(3, Math.max(0.3, initialZoom * scale));
    render();
  }
}, { passive: false });

grid.addEventListener("mouseup",   snapScroll);
grid.addEventListener("touchend",  snapScroll);

function snapScroll() {
  const block   = pixels(); // width of 15-min block
  const snapped = Math.round(grid.scrollLeft / block) * block;
  grid.scrollTo({
    left: snapped,
    behavior: "smooth"
  });
}

function getDistance(touches) {
  const dx = touches[0].pageX - touches[1].pageX;
  const dy = touches[0].pageY - touches[1].pageY;
  return Math.sqrt(dx * dx + dy * dy);
}

// ── Theme ────────────────────────────────────────────────────────
function toggleTheme() {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
}

// load saved theme
if (localStorage.getItem("theme") === "dark") document.body.classList.add("dark");


// ── Tooltip ───────────────────────────────────────────────
const tooltip = document.getElementById("tooltip");
let longPressTimer = null;

function showTooltip(text, x, y) {
  tooltip.innerText = text;
  tooltip.style.left = (x + 12) + "px";
  tooltip.style.top  = (y + 12) + "px";
  tooltip.classList.add("visible");
}

function hideTooltip() {
  tooltip.classList.remove("visible");
  clearTimeout(longPressTimer);
  longPressTimer = null;
}

function attachTooltip(el, text) {
  // Mouse hover
  el.addEventListener("mouseenter", e => showTooltip(text, e.clientX, e.clientY));
  el.addEventListener("mousemove",  e => {
    tooltip.style.left = (e.clientX + 12) + "px";
    tooltip.style.top  = (e.clientY + 12) + "px";
  });
  el.addEventListener("mouseleave", hideTooltip);

  // Long press (mobile)
  el.addEventListener("touchstart", e => {
    const t = e.touches[0];
    longPressTimer = setTimeout(() => {
      showTooltip(text, t.clientX, t.clientY);
    }, 500);
  }, { passive: true });
  el.addEventListener("touchend",   hideTooltip);
  el.addEventListener("touchmove",  hideTooltip);
}

init();

// ── PWA: Service Worker (injected as blob so single-file works) ──
const CACHE_NAME = "cruise-2026-v1";

const swCode = `
const CACHE_NAME = "${CACHE_NAME}";

self.addEventListener("install", event => {
  self.skipWaiting();
  event.waitUntil(
    caches.open(CACHE_NAME).then(cache => {
      return cache.add(self.location.href.split("?")[0]);
    })
  );
});

self.addEventListener("activate", event => {
  event.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
    )
  );
  self.clients.claim();
});

self.addEventListener("fetch", event => {
  event.respondWith(
    caches.match(event.request).then(cached => cached || fetch(event.request))
  );
});
`;

if ("serviceWorker" in navigator) {
  const swBlob = new Blob([swCode], { type: "application/javascript" });
  const swURL  = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL, { scope: "./" })
    .then(reg => console.log("SW registered, scope:", reg.scope))
    .catch(err => console.warn("SW registration failed:", err));
}
